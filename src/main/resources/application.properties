spring.application.name=ENotes



# Configuration de la base de donn�es PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/enotes
spring.datasource.username=postgres
spring.datasource.password=Rush1234
spring.datasource.driver-class-name=org.postgresql.Driver



# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Stratégie de nommage : utiliser les noms de colonnes tels qu'ils sont dans @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
